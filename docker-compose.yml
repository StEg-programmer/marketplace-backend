services:
  db:
    image: postgres:16
    container_name: mp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: mp_user
      POSTGRES_PASSWORD: mp_pass
    ports:
      - "5432:5432"
    volumes:
      - mp_pgdata:/var/lib/postgresql/data

volumes:
  mp_pgdata: